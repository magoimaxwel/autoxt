{{define "content"}}
<article class="single">
    <h1>{{.Article.Title}}</h1>
    <p class="article-meta">{{.Article.CreatedAt}} &nbsp;·&nbsp; <span>{{.Article.Views}} views</span></p>
    <div class="article-body">
        {{.Article.Content}}
    </div>
    <a href="/" class="back-link">← Back to home</a>
</article>
{{end}}
